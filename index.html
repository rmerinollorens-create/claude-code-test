<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roberto es la bomba con Claude</title>
  <style>
    /* ─── Fonts ─────────────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

    /* ─── Reset / Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #ff2200;
      --green-dim:  #cc1a00;
      --green-dark: #3b0000;
      --green-glow: rgba(255, 34, 0, 0.35);
      --black:      #0d0000;
      --panel:      rgba(10, 0, 0, 0.88);
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* ─── Matrix Rain Canvas ────────────────────────────────── */
    #matrixCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.18;
    }

    /* ─── Layout ────────────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }

    /* ─── Header ────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 0 0 12px var(--green);
    }

    .ascii-logo {
      font-family: 'VT323', monospace;
      font-size: clamp(22px, 4vw, 38px);
      letter-spacing: 4px;
      color: var(--green);
    }

    .subtitle {
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 6px;
      margin-top: 4px;
    }

    /* ─── Terminal Window ───────────────────────────────────── */
    #terminal {
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid var(--green-dim);
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(0,255,65,0.08),
        0 0 30px rgba(0,255,65,0.12),
        inset 0 0 60px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    /* title bar */
    .term-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(0,255,65,0.06);
      border-bottom: 1px solid rgba(0,255,65,0.18);
      flex-shrink: 0;
    }

    .term-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--green-dark);
      border: 1px solid var(--green-dim);
    }

    .term-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--green-dim);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── RM Badge in title bar ─────────────────────────────── */
    .rm-badge {
      display: inline-flex;
      align-items: center;
      margin-right: 6px;
      opacity: 0.65;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ─── Static Content Area ───────────────────────────────── */
    #content {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 14px;
      line-height: 1.7;
      color: #ffb8b0;
    }

    #content .line::before {
      content: '> ';
      color: var(--green);
    }

    /* ─── Scanlines overlay ─────────────────────────────────── */
    #scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 5;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
    }

    /* ─── Footer ────────────────────────────────────────────── */
    footer {
      margin-top: 12px;
      font-size: 10px;
      color: rgba(0,255,65,0.2);
      letter-spacing: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #rm-footer {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #rm-footer svg {
      filter: drop-shadow(0 0 3px rgba(255,255,255,0.35));
    }

    #rm-footer-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.22);
      margin-left: 4px;
    }
  </style>
</head>

<script>
  /* ═══════════════════════════════════════════════════════════
     Matrix Rain
  ═══════════════════════════════════════════════════════════ */
  (function () {
    const canvas = document.getElementById('matrixCanvas');
    const ctx    = canvas.getContext('2d');

    const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*()_+-=[]{}|;:,.<>?/~`';
    const FONT_SIZE = 14;
    let cols, drops;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cols  = Math.floor(canvas.width / FONT_SIZE);
      drops = Array(cols).fill(1);
    }

    function draw() {
      ctx.fillStyle = 'rgba(13, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = FONT_SIZE + 'px Share Tech Mono';

      for (let i = 0; i < drops.length; i++) {
        const ch = CHARS[Math.floor(Math.random() * CHARS.length)];

        ctx.fillStyle = '#ffffff';
        ctx.fillText(ch, i * FONT_SIZE, drops[i] * FONT_SIZE);

        if (drops[i] > 1) {
          ctx.fillStyle = '#aaaaaa';
          ctx.fillText(
            CHARS[Math.floor(Math.random() * CHARS.length)],
            i * FONT_SIZE,
            (drops[i] - 1) * FONT_SIZE
          );
        }

        if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    resize();
    window.addEventListener('resize', resize);
    setInterval(draw, 45);
  })();
</script>
